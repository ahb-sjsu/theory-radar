name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff black
      - name: Check formatting with black
        run: black --check src/ tests/
      - name: Lint with ruff
        run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[dev,ensemble]"
      - name: Run symbolic search tests
        run: python -m pytest tests/test_symbolic_search/ -v
      - name: Run tensor tests (if scipy available)
        run: |
          pip install scipy tensorly
          python -m pytest tests/test_hamiltonian.py -v || true
