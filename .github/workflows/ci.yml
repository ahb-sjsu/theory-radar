name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Check formatting with ruff
        run: ruff format --check src/ tests/
      # Note: run_*.py experiment scripts are excluded from lint
      # (they use exec() patterns that violate E402/E401)

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[dev,ensemble]"
      - name: Run symbolic search tests
        run: python -m pytest tests/test_symbolic_search/ -v --tb=short
      - name: Run projection tests
        run: python -m pytest tests/ -k "projection" -v --tb=short || true

  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for large files
        run: |
          find . -name "*.json" -size +1M -exec echo "LARGE: {}" \;
          find . -name "*.gif" -size +5M -exec echo "LARGE: {}" \;
      - name: Check no secrets
        run: |
          ! grep -r "password\|secret\|token" src/ --include="*.py" -l || true
